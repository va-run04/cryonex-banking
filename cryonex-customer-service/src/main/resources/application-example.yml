server:
  port: 8081

spring:
  application:
    name: cryonex-customer-service

  datasource:
    url: jdbc:mysql://localhost:3306/cryonex_customer_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: your_mysql_username
    password: your_mysql_password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 5MB

logging:
  level:
    root: INFO
    com.cryonex: DEBUG
    org.hibernate.SQL: DEBUG
